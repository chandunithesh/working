<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Agriculture Products</title>        

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 180px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>Falcon Agriculture Products</h1>

    <div class="product-grid">

        <div class="product-card">
            <img src="../assets/agri1.jpg">
            <h3>Agriculture Pump</h3>
            <p>High efficiency irrigation pump</p>
            <a href="#" class="btn">View Details</a>
        </div>

        <div class="product-card">
            <img src="../assets/agri2.jpg">
            <h3>Submersible Pump</h3>
            <p>Deep water farming pump</p>
            <a href="#" class="btn">View Details</a>
        </div>

    </div>

</body>
</html>
