<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crompton Domestic Products</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 180px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: blue;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>Crompton Domestic Products</h1>

    <div class="product-grid">

        <div class="product-card">
            <img src="../assets/dom1.jpg">
            <h3>Home Water Pump</h3>
            <p>Reliable household pump</p>
            <a href="#" class="btn">View Details</a>
        </div>

        <div class="product-card">
            <img src="../assets/dom2.jpg">
            <h3>Booster Pump</h3>
            <p>High pressure home pump</p>
            <a href="#" class="btn">View Details</a>
        </div>

    </div>

</body>
</html>
